<VirtualHost *:${LISTEN}>
    ServerName ${SERVER_NAME}
    DocumentRoot "${WWWROOT}"

    <Directory "${WWWROOT}">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <IfModule dir_module>
        DirectoryIndex index.php index.html
    </IfModule>

${PHP_FPM_DIRECTIVE}
</VirtualHost>
