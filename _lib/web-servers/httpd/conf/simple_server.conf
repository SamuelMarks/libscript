<VirtualHost *:${HTTPD_LISTEN}>
    ServerName ${HTTPD_SERVER_NAME}
    DocumentRoot "${HTTPD_WWWROOT}"

    <Directory "${HTTPD_WWWROOT}">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <IfModule dir_module>
        DirectoryIndex index.php index.html
    </IfModule>

${PHP_FPM_DIRECTIVE}
</VirtualHost>
