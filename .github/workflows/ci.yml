name: CI Tests

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  test:
    name: ${{ matrix.component }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      LIBSCRIPT_WINDOWS_PKG_MGR: "choco"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
