          - os: windows-latest
            component: "_lib/web-servers/nginx"
          - os: windows-latest
            component: "_lib/databases/postgres"
          - os: windows-latest
            component: "_lib/message-brokers/rabbitmq"
          - os: windows-latest
            component: "_lib/databases/etcd"
          - os: windows-latest
            component: "app/third_party/jupyterhub"
          - os: windows-latest
            component: "app/third_party/serve-actix-diesel-auth-scaffold"
          - os: windows-latest
            component: "app/third_party/firecrawl"
          - os: windows-latest
            component: "app/third_party/openvpn"
          - os: windows-latest
            component: "app/_storage/celery"
          - os: ubuntu-latest
            component: "_lib/security/openbao"
          - os: ubuntu-latest
            component: "app/third_party/wordpress"
          - os: macos-latest
            component: "app/third_party/wordpress"
          - os: macos-latest
            component: "app/third_party/serve-actix-diesel-auth-scaffold"
          - os: macos-latest
            component: "_lib/orchestration/docker"
          - os: windows-latest
            component: "app/third_party/wordpress"

    steps:
      - uses: actions/checkout@v4

      - name: Setup & Test (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          export PATH="/snap/bin:/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$HOME/.deno/bin:/usr/local/go/bin:$PATH"

          cd ${{ matrix.component }}
          
          if [ -f "env.sh" ]; then
            source ./env.sh
          fi

          if [ -f ./setup.sh ]; then
            sh ./setup.sh 
          elif [ -f ./setup_generic.sh ]; then
            sh ./setup_generic.sh 
          fi
          
          if [ -x ./test.sh ]; then
            ./test.sh
          else
            echo "No test.sh found"
          fi

      - name: Setup & Test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd ${{ matrix.component }}
          if exist setup.cmd ( call setup.cmd || exit /b 1 )
          if exist setup_win.ps1 ( powershell -ExecutionPolicy Bypass -File setup_win.ps1 || exit /b 1 )
          FOR /F "tokens=*" %%A IN ('powershell -NoProfile -Command "[Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [Environment]::GetEnvironmentVariable('Path', 'User')"') DO ( SET "PATH=%%A;%PATH%" )
          if exist test.cmd ( call test.cmd || exit /b 1 ) else ( echo "No test.cmd found" )
