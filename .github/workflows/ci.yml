name: CI Tests

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  test:
    name: ${{ matrix.component }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        component:
          - "app/_storage/celery"
          - "app/third_party/firecrawl"
          - "app/third_party/jupyterhub"
          - "app/third_party/openvpn"
          - "app/third_party/serve-actix-diesel-auth-scaffold"
          - "app/third_party/wordpress"
          - "_lib/_bootstrap/7zip"
          - "_lib/_bootstrap/apk"
          - "_lib/_bootstrap/brew"
          - "_lib/_bootstrap/busybox"
          - "_lib/_bootstrap/choco"
          - "_lib/_bootstrap/curl"
          - "_lib/_bootstrap/dash"
          - "_lib/_bootstrap/msys2"
          - "_lib/_bootstrap/nix"
          - "_lib/_bootstrap/pkgx"
          - "_lib/_bootstrap/powershell"
          - "_lib/_bootstrap/scoop"
          - "_lib/_bootstrap/wget"
          - "_lib/_bootstrap/winget"
          - "_lib/_git"
          - "_lib/_server/caddy"
          - "_lib/_server/docker"
          - "_lib/_server/fluentbit"
          - "_lib/_server/httpd"
          - "_lib/_server/iis"
          - "_lib/_server/kubernetes_k0s"
          - "_lib/_server/kubernetes_thw"
          - "_lib/_server/nginx"
          - "_lib/_server/nodejs"
          - "_lib/_server/openbao"
          - "_lib/_server/python"
          - "_lib/_server/rust"
          - "_lib/_storage/etcd"
          - "_lib/_storage/mariadb"
          - "_lib/_storage/mongodb"
          - "_lib/_storage/postgres"
          - "_lib/_storage/rabbitmq"
          - "_lib/_storage/sqlite"
          - "_lib/_storage/valkey"
          - "_lib/_toolchain/bun"
          - "_lib/_toolchain/c"
          - "_lib/_toolchain/cc"
          - "_lib/_toolchain/cpp"
          - "_lib/_toolchain/csharp"
          - "_lib/_toolchain/deno"
          - "_lib/_toolchain/elixir"
          - "_lib/_toolchain/go"
          - "_lib/_toolchain/java"
          - "_lib/_toolchain/jq"
          - "_lib/_toolchain/kotlin"
          - "_lib/_toolchain/nodejs"
          - "_lib/_toolchain/php"
          - "_lib/_toolchain/python"
          - "_lib/_toolchain/ruby"
          - "_lib/_toolchain/rust"
          - "_lib/_toolchain/sh"
          - "_lib/_toolchain/swift"
          - "_lib/_toolchain/wait4x"
          - "_lib/_toolchain/zig"
        exclude:
          - os: ubuntu-latest
            component: "_lib/_server/kubernetes_thw"
          - os: macos-latest
            component: "_lib/_server/kubernetes_k0s"
          - os: macos-latest
            component: "_lib/_server/kubernetes_thw"
          - os: macos-latest
            component: "_lib/_server/rust"
          - os: windows-latest
            component: "_lib/_server/kubernetes_k0s"
          - os: windows-latest
            component: "_lib/_server/kubernetes_thw"
          - os: windows-latest
            component: "_lib/_server/nginx"
          - os: windows-latest
            component: "_lib/_storage/postgres"
          - os: windows-latest
            component: "_lib/_storage/rabbitmq"
          - os: windows-latest
            component: "_lib/_storage/etcd"
          - os: windows-latest
            component: "app/third_party/jupyterhub"
          - os: windows-latest
            component: "app/third_party/serve-actix-diesel-auth-scaffold"
          - os: windows-latest
            component: "app/third_party/firecrawl"
          - os: windows-latest
            component: "app/third_party/openvpn"
          - os: windows-latest
            component: "app/_storage/celery"

    steps:
      - uses: actions/checkout@v4

      - name: Setup & Test (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          export PATH="/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$HOME/.deno/bin:/usr/local/go/bin:$PATH"

          cd ${{ matrix.component }}
          
          if [ -f "env.sh" ]; then
            source ./env.sh
          fi

          if [ -f ./setup.sh ]; then
            sh ./setup.sh 
          elif [ -f ./setup_generic.sh ]; then
            sh ./setup_generic.sh 
          fi
          
          if [ -x ./test.sh ]; then
            ./test.sh
          else
            echo "No test.sh found"
          fi

      - name: Setup & Test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd ${{ matrix.component }}
          if exist setup.cmd ( call setup.cmd || exit /b 1 )
          if exist setup_win.ps1 ( powershell -ExecutionPolicy Bypass -File setup_win.ps1 || exit /b 1 )
          FOR /F "tokens=*" %%A IN ('powershell -NoProfile -Command "[Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + [Environment]::GetEnvironmentVariable('Path', 'User')"') DO ( SET "PATH=%%A;%PATH%" )
          if exist test.cmd ( call test.cmd || exit /b 1 ) else ( echo "No test.cmd found" )
